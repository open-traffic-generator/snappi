  optional uint32 as_number = 1;

  message AddressFamily {
    enum Enum {
      unspecified = 0;
      ipv4 = 1;
      ipv6 = 2;
    }
  }
  // Determines the address type
  // default = AddressFamily.Enum.ipv4
