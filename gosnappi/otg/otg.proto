  message AsType {
    enum Enum {
      unspecified = 0;
      ibgp = 1;
      ebgp = 2;
    }
  }
  // The type of BGP autonomous system. External BGP is used for BGP links between two
  // or more autonomous systems (ebgp). Internal BGP is used within a single autonomous
